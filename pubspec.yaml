name: flutter_pasarela_pago
description: Simulación de Pasarela de Pago con Firebase Firestore
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.11.0
  cloud_firestore: ^6.6.0
  intl: ^0.19.0
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # Agregados para el Icono y la Splash Screen:
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21


flutter_native_splash:
  color: "#6C63FF"
  image: "assets/splash_logo.png"
  
  android_12:
    image: "assets/splash_logo.png"
    color: "#6C63FF"